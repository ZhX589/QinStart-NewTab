<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00BCF2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5B9BD5;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- 圆角矩形背景 -->
  <rect x="16" y="16" width="96" height="96" rx="24" ry="24" fill="url(#grad1)" />
  <!-- "轻" 字简化抽象 -->
  <g transform="translate(64,64)" fill="white">
    <!-- 横线（代表轻盈） -->
    <rect x="-28" y="-16" width="56" height="6" rx="3" />
    <rect x="-22" y="0" width="44" height="6" rx="3" />
    <rect x="-28" y="16" width="56" height="6" rx="3" />
    <!-- 竖线（代表启动/开启） -->
    <circle cx="0" cy="-28" r="8" />
  </g>
</svg>
