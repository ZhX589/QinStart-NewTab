<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>轻启标签页</title>
    <style>
        :root {
            /* ========== 亮色模式变量 ========== */
            --bg-light: #f0f0f0;
            --bg-img-light: '';
            --text-primary-light: #1a1a1a;
            --text-secondary-light: #555;
            --clock-color-light: #1a1a1a;
            --date-color-light: #666;
            --search-bg-light: rgba(0, 0, 0, 0.85);
            --search-text-light: #ccc;
            --search-placeholder-light: #999;
            --quote-bg-light: rgba(255, 255, 255, 0.45);
            --quote-text-light: #2c2c2c;
            --quote-author-light: #666;
            --quote-border-light: rgba(255, 255, 255, 0.6);
            --settings-bg-light: rgba(255, 255, 255, 0.95);
            --settings-text-light: #1a1a1a;
            --settings-shadow-light: rgba(0, 0, 0, 0.2);

            /* ========== 暗色模式变量 ========== */
            --bg-dark: #1a1a2e;
            --bg-img-dark: '';
            --text-primary-dark: #e0e0e0;
            --text-secondary-dark: #aaa;
            --clock-color-dark: #e0e0e0;
            --date-color-dark: #aaa;
            --search-bg-dark: rgba(40, 40, 60, 0.9);
            --search-text-dark: #ddd;
            --search-placeholder-dark: #888;
            --quote-bg-dark: rgba(30, 30, 40, 0.55);
            --quote-text-dark: #ddd;
            --quote-author-dark: #aaa;
            --quote-border-dark: rgba(255, 255, 255, 0.15);
            --settings-bg-dark: rgba(30, 30, 45, 0.95);
            --settings-text-dark: #e0e0e0;
            --settings-shadow-dark: rgba(0, 0, 0, 0.5);

            /* ========== 当前模式默认值(亮色) ========== */
            --bg: var(--bg-light);
            --bg-img: var(--bg-img-light);
            --text-primary: var(--text-primary-light);
            --text-secondary: var(--text-secondary-light);
            --clock-color: var(--clock-color-light);
            --date-color: var(--date-color-light);
            --search-bg: var(--search-bg-light);
            --search-text: var(--search-text-light);
            --search-placeholder: var(--search-placeholder-light);
            --quote-bg: var(--quote-bg-light);
            --quote-text: var(--quote-text-light);
            --quote-author: var(--quote-author-light);
            --quote-border: var(--quote-border-light);
            --settings-bg: var(--settings-bg-light);
            --settings-text: var(--settings-text-light);
            --settings-shadow: var(--settings-shadow-light);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: var(--bg);
            background-image: var(--bg-img);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: var(--text-primary);
            transition: background-color 0.4s ease, color 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        /* ========== 顶部：时钟区域 ========== */
        .time-section {
            text-align: center;
            margin-bottom: 30px;
            user-select: none;
        }

        .clock {
            font-size: 96px;
            font-weight: 700;
            letter-spacing: 4px;
            color: var(--clock-color);
            text-shadow: 0 2px 20px rgba(0, 0, 0, 0.1);
            transition: color 0.4s ease;
            font-variant-numeric: tabular-nums;
            font-family: "SF Mono", "Cascadia Code", "Consolas", "Menlo", monospace;
        }

        .date {
            font-size: 20px;
            color: var(--date-color);
            margin-top: 6px;
            font-weight: 400;
            letter-spacing: 1px;
            transition: color 0.4s ease;
        }

        /* ========== 中部：搜索框 ========== */
        .search-section {
            margin-bottom: 36px;
        }

        .search-box {
            display: flex;
            align-items: center;
            width: 540px;
            max-width: 85vw;
            height: 48px;
            background: var(--search-bg);
            border-radius: 24px;
            padding: 0 20px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.15);
            transition: background 0.4s ease, box-shadow 0.3s ease;
        }

        .search-box:focus-within {
            box-shadow: 0 4px 28px var(--settings-shadow);
        }

        .search-icon {
            width: 22px;
            height: 22px;
            margin-right: 12px;
            flex-shrink: 0;
            opacity: 0.85;
        }

        .search-icon svg path {
            fill: var(--search-text);
            transition: fill 0.4s ease;
        }

        .search-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--search-text);
            font-size: 16px;
            font-family: inherit;
            transition: color 0.4s ease;
        }

        .search-input::placeholder {
            color: var(--search-placeholder);
            transition: color 0.4s ease;
        }

        /* ========== 底部：一言语录 ========== */
        .quote-section {
            max-width: 600px;
            width: 85vw;
        }

        .quote-card {
            background: var(--quote-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--quote-border);
            border-radius: 16px;
            padding: 24px 28px 20px;
            text-align: center;
            transition: background 0.4s ease, border-color 0.4s ease;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
        }

        .quote-text {
            font-size: 17px;
            line-height: 1.7;
            color: var(--quote-text);
            transition: color 0.4s ease;
            word-break: break-word;
        }

        .quote-author {
            display: block;
            text-align: right;
            margin-top: 12px;
            font-size: 14px;
            color: var(--quote-author);
            transition: color 0.4s ease;
            font-style: normal;
        }

        .quote-loading {
            opacity: 0.6;
            font-style: italic;
        }

        /* ========== 右下角设置按钮 ========== */
        .settings-btn {
            position: fixed;
            bottom: 24px;
            right: 28px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: var(--quote-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            cursor: pointer;
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.4s ease, transform 0.2s ease;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
            color: var(--text-primary);
            z-index: 100;
        }

        .settings-btn:hover {
            transform: scale(1.08) rotate(30deg);
        }

        .settings-btn:active {
            transform: scale(0.95);
        }

        /* ========== 设置面板 ========== */
        .settings-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.35);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
        }

        .settings-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .settings-panel {
            background: var(--settings-bg);
            color: var(--settings-text);
            border-radius: 20px;
            padding: 32px 28px 24px;
            width: 400px;
            max-width: 90vw;
            box-shadow: 0 16px 48px var(--settings-shadow);
            transition: background 0.4s ease, color 0.4s ease;
            max-height: 85vh;
            overflow-y: auto;
        }

        .settings-panel h2 {
            text-align: center;
            margin-bottom: 24px;
            font-size: 22px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .setting-group {
            margin-bottom: 20px;
        }

        .setting-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-secondary);
            transition: color 0.4s ease;
        }

        .mode-toggle {
            display: flex;
            gap: 10px;
        }

        .mode-btn {
            flex: 1;
            padding: 10px 16px;
            border: 2px solid transparent;
            border-radius: 10px;
            cursor: pointer;
            font-size: 15px;
            background: rgba(128, 128, 128, 0.1);
            color: var(--text-primary);
            transition: all 0.25s ease;
            font-family: inherit;
        }

        .mode-btn.active {
            border-color: #5b9bd5;
            background: rgba(91, 155, 213, 0.15);
            font-weight: 600;
        }

        .mode-btn:hover {
            background: rgba(128, 128, 128, 0.2);
        }

        .file-input-row {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .file-input-label {
            display: inline-block;
            padding: 8px 16px;
            background: rgba(91, 155, 213, 0.2);
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.2s ease;
            white-space: nowrap;
        }

        .file-input-label:hover {
            background: rgba(91, 155, 213, 0.35);
        }

        .file-input {
            display: none;
        }

        .file-name {
            font-size: 12px;
            color: var(--text-secondary);
            max-width: 160px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            transition: color 0.4s ease;
        }

        .reset-btn {
            padding: 6px 12px;
            font-size: 12px;
            border: 1px solid rgba(128, 128, 128, 0.3);
            border-radius: 6px;
            background: transparent;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .reset-btn:hover {
            border-color: #e05555;
            color: #e05555;
        }

        .close-btn {
            display: block;
            margin: 20px auto 0;
            padding: 10px 40px;
            border: none;
            border-radius: 10px;
            background: rgba(128, 128, 128, 0.2);
            color: var(--text-primary);
            cursor: pointer;
            font-size: 15px;
            transition: background 0.2s ease;
            font-family: inherit;
        }

        .close-btn:hover {
            background: rgba(128, 128, 128, 0.35);
        }

        /* ========== 响应式 ========== */
        @media (max-width: 600px) {
            .clock {
                font-size: 60px;
            }
            .date {
                font-size: 16px;
            }
            .search-box {
                width: 90vw;
                height: 44px;
                padding: 0 16px;
            }
            .quote-card {
                padding: 18px 20px 16px;
            }
            .quote-text {
                font-size: 15px;
            }
            .settings-panel {
                padding: 24px 20px 20px;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <!-- ==================== 顶部：时钟 ==================== -->
    <div class="time-section">
        <div class="clock" id="clock">00:00:00</div>
        <div class="date" id="date">加载中...</div>
    </div>

    <!-- ==================== 中部：搜索框 ==================== -->
    <div class="search-section">
        <form class="search-box" id="searchForm" action="https://www.bing.com/search" method="get" target="_self">
            <span class="search-icon">
                <i class="fa-solid fa-magnifying-glass"></i>
            </span>
            <input type="text" class="search-input" name="q" placeholder="必应搜索" autocomplete="off" id="searchInput">
        </form>
    </div>

    <!-- ==================== 底部：一言语录 ==================== -->
    <div class="quote-section">
        <div class="quote-card">
            <p class="quote-text" id="hitokoto_text">『数据加载中...』</p>
            <span class="quote-author" id="hitokoto_author"></span>
        </div>
    </div>

    <!-- ==================== 设置按钮 ==================== -->
    <button class="settings-btn" id="settingsBtn" title="设置">⚙</button>

    <!-- ==================== 设置面板 ==================== -->
    <div class="settings-overlay" id="settingsOverlay">
        <div class="settings-panel">
            <h2>设置</h2>

            <div class="setting-group">
                <span class="setting-label">显示模式</span>
                <div class="mode-toggle">
                    <button class="mode-btn active" id="modeLightBtn">☀ 亮色</button>
                    <button class="mode-btn" id="modeDarkBtn">🌙 暗色</button>
                </div>
            </div>

            <div class="setting-group">
                <span class="setting-label">亮色背景图片</span>
                <div class="file-input-row">
                    <label class="file-input-label" for="bgLightInput">选择文件</label>
                    <input type="file" class="file-input" id="bgLightInput" accept="image/*">
                    <span class="file-name" id="bgLightName">未设置</span>
                    <button class="reset-btn" id="resetLightBg">重置</button>
                </div>
            </div>

            <div class="setting-group">
                <span class="setting-label">暗色背景图片</span>
                <div class="file-input-row">
                    <label class="file-input-label" for="bgDarkInput">选择文件</label>
                    <input type="file" class="file-input" id="bgDarkInput" accept="image/*">
                    <span class="file-name" id="bgDarkName">未设置</span>
                    <button class="reset-btn" id="resetDarkBg">重置</button>
                </div>
            </div>

            <button class="close-btn" id="closeSettings">关闭</button>
        </div>
    </div>

    <script>
        // ==================== DOM 元素 ====================
        const clockEl = document.getElementById('clock');
        const dateEl = document.getElementById('date');
        const searchForm = document.getElementById('searchForm');
        const searchInput = document.getElementById('searchInput');
        const hitokotoText = document.getElementById('hitokoto_text');
        const hitokotoAuthor = document.getElementById('hitokoto_author');

        const settingsBtn = document.getElementById('settingsBtn');
        const settingsOverlay = document.getElementById('settingsOverlay');
        const closeSettings = document.getElementById('closeSettings');

        const modeLightBtn = document.getElementById('modeLightBtn');
        const modeDarkBtn = document.getElementById('modeDarkBtn');
        const bgLightInput = document.getElementById('bgLightInput');
        const bgDarkInput = document.getElementById('bgDarkInput');
        const bgLightName = document.getElementById('bgLightName');
        const bgDarkName = document.getElementById('bgDarkName');
        const resetLightBg = document.getElementById('resetLightBg');
        const resetDarkBg = document.getElementById('resetDarkBg');

        // ==================== 常量 ====================
        const STORAGE_KEY_MODE = 'lightstart_mode';
        const STORAGE_KEY_BG_LIGHT = 'lightstart_bg_light';
        const STORAGE_KEY_BG_DARK = 'lightstart_bg_dark';

        // ==================== 状态 ====================
        let currentMode = 'light'; // 'light' | 'dark'

        // ==================== 初始化 ====================
        function init() {
            loadMode();
            loadBackgrounds();
            applyMode();
            updateClock();
            setInterval(updateClock, 1000);
            fetchHitokoto();
            bindEvents();
        }

        // ==================== 时钟 ====================
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            clockEl.textContent = `${hours}:${minutes}:${seconds}`;

            const year = now.getFullYear();
            const month = now.getMonth() + 1;
            const day = now.getDate();
            const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
            const weekday = weekdays[now.getDay()];
            dateEl.textContent = `${year}年${month}月${day}日 星期${weekday}`;
        }

        // ==================== 一言 API ====================
        function fetchHitokoto() {
            hitokotoText.textContent = '『数据加载中...』';
            hitokotoAuthor.textContent = '';

            fetch('https://v1.hitokoto.cn')
                .then(response => {
                    if (!response.ok) throw new Error('Network response was not ok');
                    return response.json();
                })
                .then(data => {
                    hitokotoText.textContent = `『${data.hitokoto}』`;
                    hitokotoAuthor.textContent = data.from ? `—— ${data.from}` : '';
                })
                .catch(() => {
                    hitokotoText.textContent = '『静以修身，俭以养德』';
                    hitokotoAuthor.textContent = '—— 诸葛亮';
                });
        }

        // ==================== 模式切换 ====================
        function loadMode() {
            const saved = localStorage.getItem(STORAGE_KEY_MODE);
            currentMode = (saved === 'dark') ? 'dark' : 'light';
        }

        function saveMode() {
            localStorage.setItem(STORAGE_KEY_MODE, currentMode);
        }

        function applyMode() {
            const root = document.documentElement;

            if (currentMode === 'dark') {
                root.style.setProperty('--bg', 'var(--bg-dark)');
                root.style.setProperty('--bg-img', 'var(--bg-img-dark)');
                root.style.setProperty('--text-primary', 'var(--text-primary-dark)');
                root.style.setProperty('--text-secondary', 'var(--text-secondary-dark)');
                root.style.setProperty('--clock-color', 'var(--clock-color-dark)');
                root.style.setProperty('--date-color', 'var(--date-color-dark)');
                root.style.setProperty('--search-bg', 'var(--search-bg-dark)');
                root.style.setProperty('--search-text', 'var(--search-text-dark)');
                root.style.setProperty('--search-placeholder', 'var(--search-placeholder-dark)');
                root.style.setProperty('--quote-bg', 'var(--quote-bg-dark)');
                root.style.setProperty('--quote-text', 'var(--quote-text-dark)');
                root.style.setProperty('--quote-author', 'var(--quote-author-dark)');
                root.style.setProperty('--quote-border', 'var(--quote-border-dark)');
                root.style.setProperty('--settings-bg', 'var(--settings-bg-dark)');
                root.style.setProperty('--settings-text', 'var(--settings-text-dark)');
                root.style.setProperty('--settings-shadow', 'var(--settings-shadow-dark)');
                modeLightBtn.classList.remove('active');
                modeDarkBtn.classList.add('active');
            } else {
                root.style.setProperty('--bg', 'var(--bg-light)');
                root.style.setProperty('--bg-img', 'var(--bg-img-light)');
                root.style.setProperty('--text-primary', 'var(--text-primary-light)');
                root.style.setProperty('--text-secondary', 'var(--text-secondary-light)');
                root.style.setProperty('--clock-color', 'var(--clock-color-light)');
                root.style.setProperty('--date-color', 'var(--date-color-light)');
                root.style.setProperty('--search-bg', 'var(--search-bg-light)');
                root.style.setProperty('--search-text', 'var(--search-text-light)');
                root.style.setProperty('--search-placeholder', 'var(--search-placeholder-light)');
                root.style.setProperty('--quote-bg', 'var(--quote-bg-light)');
                root.style.setProperty('--quote-text', 'var(--quote-text-light)');
                root.style.setProperty('--quote-author', 'var(--quote-author-light)');
                root.style.setProperty('--quote-border', 'var(--quote-border-light)');
                root.style.setProperty('--settings-bg', 'var(--settings-bg-light)');
                root.style.setProperty('--settings-text', 'var(--settings-text-light)');
                root.style.setProperty('--settings-shadow', 'var(--settings-shadow-light)');
                modeLightBtn.classList.add('active');
                modeDarkBtn.classList.remove('active');
            }
        }

        function setMode(mode) {
            if (currentMode === mode) return;
            currentMode = mode;
            saveMode();
            applyMode();
        }

        // ==================== 背景图管理 ====================
        function loadBackgrounds() {
            const lightBg = localStorage.getItem(STORAGE_KEY_BG_LIGHT);
            const darkBg = localStorage.getItem(STORAGE_KEY_BG_DARK);

            if (lightBg) {
                document.documentElement.style.setProperty('--bg-img-light', `url(${lightBg})`);
                bgLightName.textContent = '已设置';
            }
            if (darkBg) {
                document.documentElement.style.setProperty('--bg-img-dark', `url(${darkBg})`);
                bgDarkName.textContent = '已设置';
            }
        }

        function setBackground(mode, base64) {
            const storageKey = mode === 'light' ? STORAGE_KEY_BG_LIGHT : STORAGE_KEY_BG_DARK;
            const cssVar = mode === 'light' ? '--bg-img-light' : '--bg-img-dark';
            const nameEl = mode === 'light' ? bgLightName : bgDarkName;

            localStorage.setItem(storageKey, base64);
            document.documentElement.style.setProperty(cssVar, `url(${base64})`);
            nameEl.textContent = '已设置';

            // 如果当前模式匹配，立即刷新背景
            if (currentMode === mode) {
                document.documentElement.style.setProperty('--bg-img', `url(${base64})`);
            }
        }

        function resetBackground(mode) {
            const storageKey = mode === 'light' ? STORAGE_KEY_BG_LIGHT : STORAGE_KEY_BG_DARK;
            const cssVar = mode === 'light' ? '--bg-img-light' : '--bg-img-dark';
            const nameEl = mode === 'light' ? bgLightName : bgDarkName;

            localStorage.removeItem(storageKey);
            document.documentElement.style.setProperty(cssVar, '');
            nameEl.textContent = '未设置';

            if (currentMode === mode) {
                document.documentElement.style.setProperty('--bg-img', '');
            }
        }

        function handleFileSelect(event, mode) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                setBackground(mode, e.target.result);
            };
            reader.readAsDataURL(file);
            event.target.value = ''; // 允许重复选择同一文件
        }

        // ==================== 事件绑定 ====================
        function bindEvents() {
            // 搜索框：回车提交
            searchForm.addEventListener('submit', function(e) {
                if (!searchInput.value.trim()) {
                    e.preventDefault();
                }
            });

            // 设置面板开关
            settingsBtn.addEventListener('click', () => {
                settingsOverlay.classList.add('active');
            });
            closeSettings.addEventListener('click', () => {
                settingsOverlay.classList.remove('active');
            });
            settingsOverlay.addEventListener('click', function(e) {
                if (e.target === settingsOverlay) {
                    settingsOverlay.classList.remove('active');
                }
            });

            // ESC 关闭设置
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && settingsOverlay.classList.contains('active')) {
                    settingsOverlay.classList.remove('active');
                }
            });

            // 模式切换按钮
            modeLightBtn.addEventListener('click', () => setMode('light'));
            modeDarkBtn.addEventListener('click', () => setMode('dark'));

            // 背景图上传
            bgLightInput.addEventListener('change', (e) => handleFileSelect(e, 'light'));
            bgDarkInput.addEventListener('change', (e) => handleFileSelect(e, 'dark'));

            // 背景图重置
            resetLightBg.addEventListener('click', () => resetBackground('light'));
            resetDarkBg.addEventListener('click', () => resetBackground('dark'));
        }

        // ==================== 启动 ====================
        init();
    </script>
</body>
</html>
